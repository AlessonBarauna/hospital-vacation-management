services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital-vacation-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=hospital_vacation_management;Username=postgres;Password=postgres
      Jwt__Issuer: HospitalVacationManagement
      Jwt__Audience: HospitalVacationManagement
      Jwt__SecretKey: super-secret-key-for-development-only-change-this-value
      Jwt__ExpirationInMinutes: 120
      Seq__ServerUrl: http://seq:5341
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - seq

  postgres:
    image: postgres:16
    container_name: hospital-vacation-postgres
    environment:
      POSTGRES_DB: hospital_vacation_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - hospital_vacation_postgres_data:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    container_name: hospital-vacation-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"
    volumes:
      - hospital_vacation_seq_data:/data

volumes:
  hospital_vacation_postgres_data:
  hospital_vacation_seq_data: