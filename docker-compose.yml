services:
  postgres:
    image: postgres:16
    container_name: hospital-vacation-postgres
    environment:
      POSTGRES_DB: hospital_vacation_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - hospital_vacation_postgres_data:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    container_name: hospital-vacation-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"
    volumes:
      - hospital_vacation_seq_data:/data

volumes:
  hospital_vacation_postgres_data:
  hospital_vacation_seq_data: